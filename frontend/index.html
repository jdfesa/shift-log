<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shift Log — Gestor personal de tiempo y tareas conversacional">
    <title>Shift Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <h1>Shift Log</h1>
                </div>
                <span class="header-badge">personal</span>
            </div>
        </header>

        <!-- Chat Messages -->
        <main id="chat-container">
            <div id="messages">
                <!-- Welcome message -->
                <div class="message bot-message fade-in">
                    <div class="message-avatar">⚡</div>
                    <div class="message-content">
                        <p>¡Hola! Soy <strong>Shift Log</strong>, tu asistente personal.</p>
                        <p>Podés preguntarme cosas como:</p>
                        <ul>
                            <li>¿Qué clases tengo hoy?</li>
                            <li>¿Qué tengo pendiente esta semana?</li>
                            <li>Terminé el TP2 de Algoritmos</li>
                            <li>Agregar parcial de Redes para el 15/04</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input -->
        <footer id="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Escribí un mensaje..." 
                        autocomplete="off"
                        autofocus
                    >
                    <button type="submit" id="send-btn" aria-label="Enviar mensaje">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
