<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shift Log — Gestor personal de tiempo y tareas conversacional">
    <title>Shift Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-container">
                        <img src="/static/logo.png" alt="Shift Log Logo">
                    </div>
                    <h1 class="logo-text">Shift Log</h1>
                </div>
                <div class="header-actions">
                    <button id="btn-tasks" class="header-btn">Tasks</button>
                    <button id="btn-schedule" class="header-btn">Schedule</button>
                    <div class="provider-toggle" id="provider-toggle" title="Switch LLM Provider">
                        <span class="provider-label" data-provider="ollama">🏠</span>
                        <div class="toggle-track">
                            <div class="toggle-thumb"></div>
                        </div>
                        <span class="provider-label" data-provider="groq">☁️</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Chat Messages -->
        <main id="chat-container">
            <div id="messages">
                <!-- Welcome message -->
                <div class="message bot-message fade-in">
                    <div class="message-avatar">⚡</div>
                    <div class="message-content">
                        <p>¡Hola! Soy <strong>Shift Log</strong>, tu asistente personal.</p>
                        <p>Podés preguntarme cosas como:</p>
                        <ul>
                            <li class="suggestion-btn"
                                onclick="document.getElementById('message-input').value = this.textContent; document.getElementById('message-input').focus(); showSuggestions(this.textContent.toLowerCase());">
                                /ayuda</li>
                            <li class="suggestion-btn"
                                onclick="document.getElementById('message-input').value = this.textContent; document.getElementById('message-input').focus(); showSuggestions(this.textContent.toLowerCase());">
                                /horario</li>
                            <li class="suggestion-btn"
                                onclick="document.getElementById('message-input').value = this.textContent; document.getElementById('message-input').focus(); showSuggestions(this.textContent.toLowerCase());">
                                /tareas</li>
                            <li class="suggestion-btn"
                                onclick="document.getElementById('message-input').value = this.textContent; document.getElementById('message-input').focus(); showSuggestions(this.textContent.toLowerCase());">
                                /saludo</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input -->
        <footer id="input-area">
            <div id="command-suggestions" class="command-suggestions">
                <!-- Suggestions injected here -->
            </div>
            <form id="chat-form">
                <div class="input-wrapper">
                    <div id="ghost-input"></div>
                    <input type="text" id="message-input" placeholder="Escribí un mensaje..." autocomplete="off"
                        autofocus>
                    <button type="submit" id="send-btn" aria-label="Enviar mensaje">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Weekly Schedule</h2>
                <button id="close-modal-btn" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" id="schedule-table-container">
                <!-- Table will be injected here via JS -->
            </div>
        </div>
    </div>

    <!-- Tasks Modal -->
    <div id="tasks-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tasks</h2>
                <button id="close-tasks-btn" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body" id="tasks-container">
                <!-- Tasks will be injected here via JS -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
